name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/mdopen && bun test tests/*.test.ts

  visual-regression:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install deps and run visual tests
        shell: bash
        run: |
          apt-get update -qq && apt-get install -y -qq unzip curl > /dev/null 2>&1
          curl -fsSL https://bun.sh/install | bash
          /root/.bun/bin/bun install
          cd packages/mdopen && /root/.bun/bin/bun run build:bin
          /root/.bun/bin/bun run test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: packages/mdopen/playwright-report/
          retention-days: 7

  mermaid-gallery:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install deps and run gallery tests
        shell: bash
        run: |
          apt-get update -qq && apt-get install -y -qq unzip curl > /dev/null 2>&1
          curl -fsSL https://bun.sh/install | bash
          /root/.bun/bin/bun install
          cd packages/mdopen && /root/.bun/bin/bun run build:bin
          /root/.bun/bin/bunx playwright test tests/mermaid-gallery.spec.ts
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-gallery-report
          path: packages/mdopen/playwright-report/
          retention-days: 7
