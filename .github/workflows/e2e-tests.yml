name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build mdopen binary
        run: cd packages/mdopen && bun run build:bin

      - name: Install Playwright browsers
        run: cd packages/mdopen && npx playwright install chromium --with-deps

      - name: Run unit tests
        run: cd packages/mdopen && bun test tests/*.test.ts

      - name: Run visual regression tests
        run: cd packages/mdopen && bun run test:visual

      - name: Run mermaid gallery tests
        run: cd packages/mdopen && bunx playwright test tests/mermaid-gallery.spec.ts --workers=1

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/mdopen/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/mdopen/test-results/
          retention-days: 7
