name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: dnf install -y unzip git
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/mdopen && bun test tests/*.test.ts

  visual-regression:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: dnf install -y unzip git
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/mdopen && bun run build:bin
      - run: cd packages/mdopen && npx playwright install chromium --with-deps
      - run: cd packages/mdopen && bun run test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: packages/mdopen/playwright-report/
          retention-days: 7

  mermaid-gallery:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: dnf install -y unzip git
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/mdopen && bun run build:bin
      - run: cd packages/mdopen && npx playwright install chromium --with-deps
      - run: cd packages/mdopen && bunx playwright test tests/mermaid-gallery.spec.ts --workers=1
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-gallery-report
          path: packages/mdopen/playwright-report/
          retention-days: 7
