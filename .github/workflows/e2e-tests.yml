name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/mdopen && bun test tests/*.test.ts

  visual-regression:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - run: apt-get update -qq && apt-get install -y -qq unzip curl > /dev/null 2>&1 && curl -fsSL https://bun.sh/install | bash
      - uses: actions/checkout@v4
      - run: export BUN_INSTALL=/root/.bun && export PATH=$BUN_INSTALL/bin:$PATH && bun install
      - run: export BUN_INSTALL=/root/.bun && export PATH=$BUN_INSTALL/bin:$PATH && cd packages/mdopen && bun run build:bin
      - run: export BUN_INSTALL=/root/.bun && export PATH=$BUN_INSTALL/bin:$PATH && cd packages/mdopen && bun run test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: packages/mdopen/playwright-report/
          retention-days: 7

  mermaid-gallery:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - run: apt-get update -qq && apt-get install -y -qq unzip curl > /dev/null 2>&1 && curl -fsSL https://bun.sh/install | bash
      - uses: actions/checkout@v4
      - run: export BUN_INSTALL=/root/.bun && export PATH=$BUN_INSTALL/bin:$PATH && bun install
      - run: export BUN_INSTALL=/root/.bun && export PATH=$BUN_INSTALL/bin:$PATH && cd packages/mdopen && bun run build:bin
      - run: export BUN_INSTALL=/root/.bun && export PATH=$BUN_INSTALL/bin:$PATH && cd packages/mdopen && bunx playwright test tests/mermaid-gallery.spec.ts
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-gallery-report
          path: packages/mdopen/playwright-report/
          retention-days: 7
